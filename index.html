<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Реєстрація</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-container">
      <h2>Реєстрація</h2>

      <form>
        <div class="form-group">
          <label>Ім'я</label>
          <input type="text" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" required />
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" required />
        </div>

        <button class="submit-btn">Зареєструватися</button>
      </form>

      <p class="form-footer">Вже є акаунт? <a href="login.html">Увійти</a></p>
    </div>
  </body>
</html>
