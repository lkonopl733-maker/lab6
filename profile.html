<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Редагування профілю</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-container">
      <h2>Редагування профілю</h2>

      <form>
        <div class="form-group">
          <label>Ім’я</label>
          <input type="text" value="Єлизавета" />
        </div>

        <div class="form-group">
          <label>Прізвище</label>
          <input type="text" value="Конопля" />
        </div>

        <div class="form-group">
          <label>Логін</label>
          <input type="text" value="konopelka" />
        </div>

        <div class="form-group">
          <label>Електронна пошта</label>
          <input type="email" value="lizak@gmail.com" />
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" value="12345678" />
        </div>

        <div class="form-group">
          <label>Факультет</label>
          <input type="text" value="Комп'ютерних наук" />
        </div>

        <div class="form-group">
          <label>Група</label>
          <input type="text" value="ІКМ-224п" />
        </div>

        <div class="form-group">
          <label>Місто</label>
          <input type="text" value="Харків" />
        </div>

        <div class="form-group">
          <label>Про себе</label>
          <textarea rows="4">Студентка НТУ "ХПІ"</textarea>
        </div>

        <button class="submit-btn">Зберегти зміни</button>
      </form>

      <p class="form-footer">
        <a href="login.html">Вийти</a>
      </p>
    </div>
  </body>
</html>
